<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" style="background:#0a0a0f;font-family:monospace">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#e94560"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#06d6a0"/></marker>
    <marker id="arrB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#00b4d8"/></marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" fill="#e94560" font-size="16" font-weight="bold" text-anchor="middle" font-family="sans-serif">HANSI ZOE AI GOGGLES — WIRING DIAGRAM</text>
  <text x="450" y="44" fill="#555" font-size="9" text-anchor="middle">All connections • Power (red) • Ground (gray) • Signal (colored)</text>

  <!-- ══ XIAO ESP32-S3 SENSE ══ -->
  <rect x="60" y="80" width="200" height="220" rx="8" fill="#0c0c14" stroke="#e94560" stroke-width="1.5"/>
  <rect x="60" y="80" width="200" height="24" rx="8" fill="#e94560"/>
  <text x="160" y="96" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">XIAO ESP32-S3 Sense</text>

  <!-- XIAO pins -->
  <text x="75" y="120" fill="#888" font-size="8">Built-in:</text>
  <text x="85" y="134" fill="#ccc" font-size="8">OV2640 Camera (VGA)</text>
  <text x="85" y="148" fill="#ccc" font-size="8">PDM Mic (SCK:42 DAT:41)</text>
  <text x="85" y="162" fill="#ccc" font-size="8">LED (Pin 21)</text>
  <text x="85" y="176" fill="#ccc" font-size="8">BOOT Button (Pin 0)</text>
  <text x="75" y="196" fill="#888" font-size="8">Pads:</text>
  <text x="85" y="210" fill="#ef476f" font-size="8">BAT+ (3.7V from LiPo)</text>
  <text x="85" y="224" fill="#666" font-size="8">BAT- (GND)</text>
  <text x="75" y="244" fill="#888" font-size="8">GPIO:</text>
  <text x="85" y="258" fill="#06d6a0" font-size="8">Pin 21 → WS2812B DIN</text>
  <text x="85" y="272" fill="#00b4d8" font-size="8">BLE Server (NimBLE)</text>
  <text x="85" y="286" fill="#ccc" font-size="8">USB-C (programming + charge)</text>

  <!-- ══ T-GLASS V2 ══ -->
  <rect x="350" y="80" width="200" height="160" rx="8" fill="#0c0c14" stroke="#ffd166" stroke-width="1.5"/>
  <rect x="350" y="80" width="200" height="24" rx="8" fill="#ffd166"/>
  <text x="450" y="96" fill="#000" font-size="11" font-weight="bold" text-anchor="middle">T-Glass V2 (HUD)</text>

  <text x="365" y="120" fill="#888" font-size="8">Display:</text>
  <text x="375" y="134" fill="#ccc" font-size="8">1.1" AMOLED 294×126</text>
  <text x="375" y="148" fill="#ccc" font-size="8">Prism reflector (126×126)</text>
  <text x="365" y="168" fill="#888" font-size="8">Comms:</text>
  <text x="375" y="182" fill="#00b4d8" font-size="8">BLE Client (NimBLE)</text>
  <text x="375" y="196" fill="#ccc" font-size="8">Touch button (brightness)</text>
  <text x="365" y="216" fill="#888" font-size="8">Power:</text>
  <text x="375" y="230" fill="#ef476f" font-size="8">USB-C (from TP4056)</text>

  <!-- ══ BATTERY POD ══ -->
  <rect x="350" y="290" width="200" height="200" rx="8" fill="#0c0c14" stroke="#06d6a0" stroke-width="1.5"/>
  <rect x="350" y="290" width="200" height="24" rx="8" fill="#06d6a0"/>
  <text x="450" y="306" fill="#000" font-size="11" font-weight="bold" text-anchor="middle">Battery Pod (Nape)</text>

  <text x="365" y="332" fill="#888" font-size="8">LiPo 3.7V 1000mAh</text>
  <rect x="375" y="338" width="80" height="30" rx="4" fill="none" stroke="#ef476f" stroke-width="1" stroke-dasharray="3"/>
  <text x="415" y="357" fill="#ef476f" font-size="9" text-anchor="middle">BATTERY</text>

  <text x="365" y="386" fill="#888" font-size="8">TP4056 USB-C Module</text>
  <rect x="375" y="392" width="80" height="24" rx="4" fill="none" stroke="#ffd166" stroke-width="1"/>
  <text x="415" y="408" fill="#ffd166" font-size="8" text-anchor="middle">TP4056</text>

  <text x="365" y="432" fill="#888" font-size="8">Slide Switch (SPDT)</text>
  <rect x="375" y="438" width="50" height="16" rx="3" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="450" fill="#ccc" font-size="7" text-anchor="middle">SW1</text>

  <text x="365" y="474" fill="#888" font-size="8">USB-C Port (charging)</text>

  <!-- ══ WS2812B LEDs ══ -->
  <rect x="60" y="340" width="200" height="90" rx="8" fill="#0c0c14" stroke="#9b5de5" stroke-width="1.5"/>
  <rect x="60" y="340" width="200" height="24" rx="8" fill="#9b5de5"/>
  <text x="160" y="356" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">LED Accent Ring</text>

  <text x="75" y="382" fill="#ccc" font-size="8">3× WS2812B (daisy-chain)</text>
  <text x="75" y="396" fill="#06d6a0" font-size="8">DIN ← XIAO Pin 21</text>
  <text x="75" y="410" fill="#ef476f" font-size="8">VCC ← 3.3V | GND ← GND</text>
  <text x="75" y="424" fill="#ffd166" font-size="8">Amber gel filter overlay</text>

  <!-- ══ PHONE ══ -->
  <rect x="650" y="120" width="200" height="140" rx="8" fill="#0c0c14" stroke="#00b4d8" stroke-width="1.5"/>
  <rect x="650" y="120" width="200" height="24" rx="8" fill="#00b4d8"/>
  <text x="750" y="136" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Smartphone (App)</text>

  <text x="665" y="162" fill="#ccc" font-size="8">hansi_companion_v4.html</text>
  <text x="665" y="178" fill="#00b4d8" font-size="8">Web Bluetooth → "HansiGoggles"</text>
  <text x="665" y="194" fill="#ccc" font-size="8">Whisper STT / TTS</text>
  <text x="665" y="210" fill="#ccc" font-size="8">Multi-AI Router</text>
  <text x="665" y="226" fill="#ccc" font-size="8">RAG Memory (IndexedDB)</text>
  <text x="665" y="242" fill="#06d6a0" font-size="8">HUD Text Relay</text>

  <!-- ═══ CONNECTIONS ═══ -->

  <!-- XIAO → T-Glass (BLE) -->
  <line x1="260" y1="150" x2="350" y2="150" stroke="#00b4d8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrB)"/>
  <text x="305" y="143" fill="#00b4d8" font-size="7" text-anchor="middle">BLE HUD</text>
  <text x="305" y="160" fill="#555" font-size="6" text-anchor="middle">0x19B2xxxx</text>

  <!-- XIAO → Phone (BLE) -->
  <line x1="260" y1="200" x2="620" y2="180" stroke="#00b4d8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrB)"/>
  <text x="440" y="183" fill="#00b4d8" font-size="7" text-anchor="middle">BLE Goggles</text>
  <text x="440" y="196" fill="#555" font-size="6" text-anchor="middle">0x19B1xxxx (img/audio/cmd)</text>

  <!-- Battery → XIAO (power) -->
  <path d="M375 370 L310 370 L310 260 L260 260" fill="none" stroke="#ef476f" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="300" y="318" fill="#ef476f" font-size="7" text-anchor="middle">BAT+/BAT-</text>
  <text x="300" y="330" fill="#555" font-size="6" text-anchor="middle">(via switch)</text>

  <!-- Battery → T-Glass (power via USB-C cable) -->
  <path d="M455 400 L530 400 L530 230 L550 230" fill="none" stroke="#ef476f" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="545" y="320" fill="#ef476f" font-size="7" text-anchor="end">USB-C cable</text>

  <!-- XIAO → LEDs (data) -->
  <line x1="160" y1="300" x2="160" y2="340" stroke="#9b5de5" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="172" y="323" fill="#9b5de5" font-size="7">Pin 21</text>

  <!-- Battery internal: LiPo → Switch → TP4056 -->
  <line x1="415" y1="368" x2="415" y2="392" stroke="#ef476f" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="400" y1="416" x2="400" y2="438" stroke="#ef476f" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Phone → Cloud (API) -->
  <rect x="700" y="290" width="140" height="60" rx="6" fill="#0c0c14" stroke="#555" stroke-width="1"/>
  <text x="770" y="310" fill="#ffd166" font-size="8" text-anchor="middle">AI Cloud APIs</text>
  <text x="770" y="324" fill="#555" font-size="7" text-anchor="middle">GPT-4o / Claude / Groq</text>
  <text x="770" y="338" fill="#555" font-size="7" text-anchor="middle">Whisper / Embeddings / TTS</text>
  <line x1="750" y1="260" x2="770" y2="290" stroke="#ffd166" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="775" y="278" fill="#ffd166" font-size="6">HTTPS</text>

  <!-- Legend -->
  <rect x="650" y="390" width="200" height="100" rx="6" fill="#0c0c14" stroke="#1a1a2e" stroke-width="1"/>
  <text x="665" y="408" fill="#888" font-size="8" font-weight="bold">LEGEND</text>
  <line x1="665" y1="418" x2="695" y2="418" stroke="#ef476f" stroke-width="2"/><text x="700" y="422" fill="#ccc" font-size="7">Power (3.7V)</text>
  <line x1="665" y1="434" x2="695" y2="434" stroke="#00b4d8" stroke-width="2" stroke-dasharray="6,3"/><text x="700" y="438" fill="#ccc" font-size="7">BLE Wireless</text>
  <line x1="665" y1="450" x2="695" y2="450" stroke="#9b5de5" stroke-width="2"/><text x="700" y="454" fill="#ccc" font-size="7">Signal (GPIO)</text>
  <line x1="665" y1="466" x2="695" y2="466" stroke="#ffd166" stroke-width="2" stroke-dasharray="4,2"/><text x="700" y="470" fill="#ccc" font-size="7">Internet API</text>
  <text x="665" y="484" fill="#333" font-size="6">v2.0 — ExMachina Labs 2026</text>
</svg>
