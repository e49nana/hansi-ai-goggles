; ═══════════════════════════════════════════════════════════════
;  HANSI ZOE AI GOGGLES — PlatformIO Configuration
;  Two build environments: goggles (XIAO) + hud (T-Glass)
; ═══════════════════════════════════════════════════════════════

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0

; ── XIAO ESP32-S3 Sense (Camera + Mic + BLE Server) ──────────
[env:goggles]
platform = espressif32@6.5.0
board = seeed_xiao_esp32s3
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OPI=1
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
monitor_filters = esp32_exception_decoder

; ── T-Glass V2 (HUD Display + BLE Client) ────────────────────
[env:hud]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_QUAD=1
    -DLILYGO_TGLASS_V2=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DLV_COLOR_DEPTH=16
    -DLV_COLOR_16_SWAP=1
    -DLV_FONT_MONTSERRAT_8=1
    -DLV_FONT_MONTSERRAT_10=1
    -DLV_FONT_MONTSERRAT_12=1
    -DLV_THEME_DEFAULT_DARK=1
    -DCORE_DEBUG_LEVEL=1
board_build.arduino.memory_type = qio_qspi
board_build.partitions = default_4MB.csv
board_upload.flash_size = 4MB
lib_deps =
    ${env.lib_deps}
    lvgl/lvgl@^8.4.0
    https://github.com/Xinyuan-LilyGO/LilyGO-T-Wristband-and-T-Glass.git
monitor_filters = esp32_exception_decoder
